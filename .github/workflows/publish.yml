name: Publish to PyPI and npm

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'   # triggers on v1.4.0, v1.5.0, etc.

permissions:
  contents: read
  id-token: write   # needed for PyPI trusted publishing (OIDC)

jobs:
  # ─── PyPI ────────────────────────────────────────────────────────────────────
  publish-pypi:
    name: Build & publish to PyPI
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build tools
        run: pip install build twine

      - name: Build wheel + sdist
        run: python -m build

      - name: Check dist
        run: twine check dist/*

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        run: twine upload dist/*

  # ─── npm ─────────────────────────────────────────────────────────────────────
  publish-npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: publish-pypi   # npm wrapper pulls from PyPI, so PyPI must be live first
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ─── GitHub Release ───────────────────────────────────────────────────────────
  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [publish-pypi, publish-npm]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=${GITHUB_REF_NAME}
          VERSION=${TAG#v}
          gh release create "$TAG" \
            --title "v$VERSION" \
            --generate-notes \
            --latest

                    query:
                      type: string
                      description: 'SQL query to execute. Examples: ''SELECT * FROM table LIMIT 10'', ''SELECT col1, SUM(col2)
                        FROM table GROUP BY col1'''
                    mode:
                      type: string
                      enum:
                      - auto
                      - relational
                      - analytical
                      - sql
                      description: 'Query execution mode. Use ''auto'' for intelligent routing (recommended). Default: ''auto'''
                      default: auto

openapi: 3.0.3
info:
  title: SAP Datasphere MCP — REST API
  version: 1.0.0
  description: REST wrapper around SAP Datasphere MCP. 44 tools available. Used by M365 Copilot Studio and Gemini Enterprise.
servers:
- url: https://YOUR-TUNNEL.trycloudflare.com
  description: Cloudflare Tunnel (production)
- url: http://localhost:8080
  description: Local development
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: opaque
      description: 'Set MCP_HTTP_AUTH_TOKEN in .env; pass as Authorization: Bearer <token>'
paths:
  /api/tools/list_spaces:
    post:
      operationId: list_spaces
      summary: List all SAP Datasphere spaces with their status and metadata
      description: 'List all SAP Datasphere spaces with their status and metadata.


        **Use this tool when:**

        - User asks "What spaces are available?" or "Show me all spaces"

        - You need to discover available Datasphere environments

        - Starting data exploration workflow

        - Checking space status and availability


        **What you''ll get:**

        - Space IDs and names

        - Space status (ACTIVE, DEVELOPMENT, etc.)

        - Table/view counts per space

        - Owner information (with include_details=True)


        **Example queries:**

        - "What Datasphere spaces exist?"

        - "Show me all data spaces"

        - "Which spaces are active?"


        **Next steps after using this tool:**

        - Use get_space_info() to explore a specific space

        - Use search_tables() to find tables across spaces

        '
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                arguments:
                  type: object
                  properties:
                    include_details:
                      type: boolean
                      description: 'Set to true to include detailed information (owner, created date, connection counts).
                        Default: false for quick space listing.'
                      default: false
              required:
              - arguments
      responses:
        '200':
          description: Tool result
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    description: Tool output (string or structured JSON)
        '401':
          description: Unauthorized
        '500':
          description: Server error
      security:
      - bearerAuth: []
  /api/tools/get_space_info:
    post:
      operationId: get_space_info
      summary: Get comprehensive information about a specific SAP Datasphere space
      description: 'Get comprehensive information about a specific SAP Datasphere space.


        **Use this tool when:**

        - User asks about a specific space (e.g., "Tell me about SALES_ANALYTICS")

        - You need to see what tables/views exist in a space

        - Checking space configuration and metadata

        - Following up from list_spaces() results


        **What you''ll get:**

        - Complete space metadata (status, owner, created date)

        - List of all tables and views in the space

        - Table schemas and row counts

        - Connection information


        **Required parameter:**

        - space_id: Must be uppercase (e.g., ''SALES_ANALYTICS'', ''FINANCE_DWH'')


        **Example queries:**

        - "Show me the SALES_ANALYTICS space"

        - "What tables are in FINANCE_DWH?"

        - "Tell me about the HR_ANALYTICS space"


        **Error handling:**

        - If space not found, list_spaces() will show available spaces

        '
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                arguments:
                  type: object
                  properties:
                    space_id:
                      type: string
                      description: The space ID in UPPERCASE format (e.g., 'SALES_ANALYTICS', 'FINANCE_DWH', 'HR_ANALYTICS').
                        Must match exactly.
                  required:
                  - space_id
              required:
              - arguments
      responses:
        '200':
          description: Tool result
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    description: Tool output (string or structured JSON)
        '401':
          description: Unauthorized
        '500':
          description: Server error
      security:
      - bearerAuth: []
  /api/tools/search_tables:
    post:
      operationId: search_tables
      summary: Search for tables and views across all Datasphere spaces by name or description
      description: 'Search for tables and views across all Datasphere spaces by name or description.


        **Use this tool when:**

        - User asks "Find tables with customer data"

        - Looking for tables containing specific keywords

        - Don''t know exact table name but know the domain

        - Searching across multiple spaces


        **Search behavior:**

        - Searches both table names and descriptions

        - Case-insensitive matching

        - Returns results from all spaces (or specific space if filtered)

        - Includes table metadata (type, columns, row counts)


        **Search tips:**

        - Use domain keywords: "customer", "sales", "order", "finance"

        - Partial matches work: "cust" finds "CUSTOMER_DATA"

        - Filter by space_id to narrow results


        **Example queries:**

        - "Find all tables related to customers"

        - "Search for sales order tables"

        - "Show me all tables with ''finance'' in the name"


        **Next steps:**

        - Use get_table_schema() for detailed column information

        - Use execute_query() to retrieve actual data

        '
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                arguments:
                  type: object
                  properties:
                    search_term:
                      type: string
                      description: Keyword to search for in table names and descriptions (e.g., 'customer', 'sales', 'order').
                        Case-insensitive, partial matches work.
                    space_id:
                      type: string
                      description: 'Optional: Filter results to a specific space (e.g., ''SALES_ANALYTICS''). Leave empty
                        to search all spaces.'
                  required:
                  - search_term
              required:
              - arguments
      responses:
        '200':
          description: Tool result
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    description: Tool output (string or structured JSON)
        '401':
          description: Unauthorized
        '500':
          description: Server error
      security:
      - bearerAuth: []
  /api/tools/get_table_schema:
    post:
      operationId: get_table_schema
      summary: Get detailed schema information for a specific table or view
      description: 'Get detailed schema information for a specific table or view.


        **Use this tool when:**

        - User asks "What columns are in CUSTOMER_DATA?"

        - Need to understand table structure before querying

        - Planning JOIN operations (need to see key columns)

        - Checking data types for analysis


        **What you''ll get:**

        - Complete column list with data types

        - Primary key indicators

        - Column descriptions

        - Table metadata (row count, last updated)


        **Required parameters:**

        - space_id: The space containing the table (uppercase)

        - table_name: Exact table name (case-sensitive, usually uppercase)


        **Example queries:**

        - "Show me the schema of CUSTOMER_DATA in SALES_ANALYTICS"

        - "What columns does SALES_ORDERS have?"

        - "Describe the GL_ACCOUNTS table structure"


        **Best practices:**

        - Use search_tables() first if you don''t know the exact table name

        - Check column types before writing queries

        - Identify key columns for JOINs


        **Next steps:**

        - Use execute_query() with proper column names and types

        '
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                arguments:
                  type: object
                  properties:
                    space_id:
                      type: string
                      description: The space ID containing the table (e.g., 'SALES_ANALYTICS'). Must be uppercase.
                    table_name:
                      type: string
                      description: Exact table or view name (e.g., 'CUSTOMER_DATA', 'SALES_ORDERS'). Case-sensitive, typically
                        uppercase.
                  required:
                  - space_id
                  - table_name
              required:
              - arguments
      responses:
        '200':
          description: Tool result
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    description: Tool output (string or structured JSON)
        '401':
          description: Unauthorized
        '500':
          description: Server error
      security:
      - bearerAuth: []
  /api/tools/list_connections:
    post:
      operationId: list_connections
      summary: List all external data source connections and their current status
      description: 'List all external data source connections and their current status.


        **Use this tool when:**

        - User asks "What data sources are connected?"

        - Checking connection health and availability

        - Understanding data lineage and sources

        - Troubleshooting data refresh issues


        **What you''ll get:**

        - Connection IDs and names

        - Connection types (SAP_ERP, SALESFORCE, EXTERNAL, etc.)

        - Connection status (CONNECTED, DISCONNECTED, ERROR)

        - Host information and last tested timestamp


        **Supported connection types:**

        - SAP_ERP, SAP_S4HANA, SAP_BW

        - SALESFORCE, EXTERNAL

        - SNOWFLAKE, DATABRICKS

        - POSTGRESQL, MYSQL, ORACLE, SQLSERVER, HANA


        **Example queries:**

        - "What external connections exist?"

        - "Show me all SAP ERP connections"

        - "Check if Salesforce connection is active"


        **Use cases:**

        - Data integration monitoring

        - Connection health checks

        - Understanding data sources

        '
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                arguments:
                  type: object
                  properties:
                    connection_type:
                      type: string
                      description: 'Optional: Filter by specific connection type (e.g., ''SAP_ERP'', ''SALESFORCE'', ''EXTERNAL'').
                        Leave empty to show all connections.'
              required:
              - arguments
      responses:
        '200':
          description: Tool result
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    description: Tool output (string or structured JSON)
        '401':
          description: Unauthorized
        '500':
          description: Server error
      security:
      - bearerAuth: []
  /api/tools/get_task_status:
    post:
      operationId: get_task_status
      summary: Get status and execution details of data integration and ETL tasks
      description: 'Get status and execution details of data integration and ETL tasks.


        **Use this tool when:**

        - User asks "What tasks are running?"

        - Monitoring data pipeline execution

        - Checking when data was last refreshed

        - Troubleshooting failed tasks


        **What you''ll get:**

        - Task IDs and names

        - Execution status (COMPLETED, RUNNING, FAILED, SCHEDULED)

        - Last run timestamp and next scheduled run

        - Execution duration and records processed

        - Associated space information


        **Filtering options:**

        - No parameters: Show all tasks

        - task_id: Get specific task details

        - space_id: Show all tasks for a space


        **Example queries:**

        - "What tasks are currently running?"

        - "Show me all tasks in SALES_ANALYTICS"

        - "When did DAILY_SALES_ETL last run?"

        - "Check status of task FINANCE_RECONCILIATION"


        **Task types:**

        - ETL/data loading tasks

        - Transformation workflows

        - Scheduled data refreshes

        - Data replication jobs

        '
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                arguments:
                  type: object
                  properties:
                    task_id:
                      type: string
                      description: 'Optional: Specific task ID to check (e.g., ''DAILY_SALES_ETL''). Leave empty to see all
                        tasks.'
                    space_id:
                      type: string
                      description: 'Optional: Filter tasks by space (e.g., ''SALES_ANALYTICS''). Shows only tasks associated
                        with that space.'
              required:
              - arguments
      responses:
        '200':
          description: Tool result
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    description: Tool output (string or structured JSON)
        '401':
          description: Unauthorized
        '500':
          description: Server error
      security:
      - bearerAuth: []
  /api/tools/browse_marketplace:
    post:
      operationId: browse_marketplace
      summary: Browse and search available data packages in the SAP Datasphere marketplace
      description: 'Browse and search available data packages in the SAP Datasphere marketplace.


        **Use this tool when:**

        - User asks "What data packages are available?"

        - Looking for external reference data (benchmarks, currency rates, etc.)

        - Exploring marketplace offerings

        - Planning to enrich internal data with external sources


        **What you''ll get:**

        - Package IDs and names

        - Package descriptions and categories

        - Provider information

        - Package versions and sizes

        - Pricing information (Free or paid)


        **Categories:**

        - Reference Data (industry benchmarks, standards)

        - Financial Data (currency rates, market data)

        - Geospatial Data

        - Industry-specific datasets


        **Example queries:**

        - "What marketplace packages are available?"

        - "Find financial data packages"

        - "Show me industry benchmarks"

        - "Search for currency rate data"


        **Use cases:**

        - Data enrichment planning

        - Finding external reference data

        - Competitive benchmarking

        - Currency conversion support

        '
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                arguments:
                  type: object
                  properties:
                    category:
                      type: string
                      description: 'Optional: Filter by category (e.g., ''Reference Data'', ''Financial Data''). Leave empty
                        to browse all.'
                    search_term:
                      type: string
                      description: 'Optional: Search keyword for package names or descriptions (e.g., ''currency'', ''benchmark'').
                        Case-insensitive.'
              required:
              - arguments
      responses:
        '200':
          description: Tool result
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    description: Tool output (string or structured JSON)
        '401':
          description: Unauthorized
        '500':
          description: Server error
      security:
      - bearerAuth: []
  /api/tools/find_assets_by_column:
    post:
      operationId: find_assets_by_column
      summary: Find all assets (tables/views) containing a specific column name across SAP Datasphere spaces
      description: 'Find all assets (tables/views) containing a specific column name across SAP Datasphere spaces.


        **Use this tool when:**

        - User asks "Which tables contain CUSTOMER_ID?"

        - Performing data lineage analysis

        - Impact analysis before schema changes

        - Finding datasets for specific use cases

        - Locating related data across spaces


        **What you''ll get:**

        - Asset names and types (View, Table, etc.)

        - Space IDs where assets are located

        - Column information (name, type, position)

        - Total column count per asset

        - Consumption URLs for data access


        **Use cases:**

        - Data lineage discovery (find all uses of a column)

        - Impact analysis (before renaming/removing columns)

        - Dataset discovery (find tables with specific fields)

        - Cross-space data exploration

        - Schema relationship mapping


        **Example queries:**

        - "Find all tables with CUSTOMER_ID column"

        - "Which views contain SALES_AMOUNT?"

        - "Show me assets with COUNTRY_CODE in SAP_CONTENT space"

        - "List tables that have ORDER_DATE column"


        **Performance notes:**

        - Searches across multiple spaces by default

        - Uses intelligent caching for better performance

        - Results limited to 50 assets by default (configurable)

        - Case-insensitive search by default

        '
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                arguments:
                  type: object
                  properties:
                    column_name:
                      type: string
                      description: 'Column name to search for (case-insensitive by default). Examples: ''CUSTOMER_ID'', ''SALES_AMOUNT'',
                        ''ORDER_DATE'''
                    space_id:
                      type: string
                      description: 'Optional: Limit search to specific space (e.g., ''SAP_CONTENT''). Leave empty to search
                        all spaces.'
                    max_assets:
                      type: integer
                      description: 'Optional: Maximum number of matching assets to return (1-200). Default: 50'
                      minimum: 1
                      maximum: 200
                      default: 50
                    case_sensitive:
                      type: boolean
                      description: 'Optional: Perform case-sensitive column name matching. Default: false'
                      default: false
                  required:
                  - column_name
              required:
              - arguments
      responses:
        '200':
          description: Tool result
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    description: Tool output (string or structured JSON)
        '401':
          description: Unauthorized
        '500':
          description: Server error
      security:
      - bearerAuth: []
  /api/tools/analyze_column_distribution:
    post:
      operationId: analyze_column_distribution
      summary: Perform advanced statistical analysis of a column's data distribution including nulls, distinct values, percentiles,
        and
      description: 'Perform advanced statistical analysis of a column''s data distribution including nulls, distinct values,
        percentiles, and outlier detection.


        **Use this tool when:**

        - User asks "What''s the data quality of AMOUNT column?"

        - Performing data profiling before analytics

        - Assessing column completeness and distribution

        - Detecting outliers and data anomalies

        - Understanding data patterns for ML/AI


        **What you''ll get:**

        - Basic statistics (count, nulls, distinct values, completeness)

        - Numeric statistics (min, max, mean, percentiles)

        - Distribution analysis (top values, frequency)

        - Outlier detection (IQR method)

        - Data quality assessment


        **Use cases:**

        - Data quality assessment

        - Pre-analytics data profiling

        - Outlier and anomaly detection

        - Understanding value distributions

        - ML feature engineering preparation

        - Data cleansing planning


        **Example queries:**

        - "Analyze the distribution of SALES_AMOUNT column"

        - "What''s the data quality of CUSTOMER_AGE?"

        - "Profile the ORDER_STATUS column"

        - "Detect outliers in PRICE column"

        - "Show me statistics for QUANTITY field"


        **Analysis includes:**

        - Null percentage and completeness rate

        - Distinct value count and cardinality

        - For numeric columns: min, max, mean, percentiles (p25, p50, p75)

        - Top value frequencies

        - Outlier detection using IQR method

        - Data quality recommendations


        **Performance notes:**

        - Analyzes up to 10,000 records (configurable)

        - Default sample size: 1,000 records

        - Works with numeric, string, and date columns

        - Automatic type detection and appropriate statistics

        '
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                arguments:
                  type: object
                  properties:
                    space_id:
                      type: string
                      description: Space ID containing the asset (e.g., 'SAP_CONTENT', 'SALES_ANALYTICS')
                    asset_name:
                      type: string
                      description: Asset (table/view) name containing the column
                    column_name:
                      type: string
                      description: Column name to analyze (e.g., 'SALES_AMOUNT', 'CUSTOMER_AGE', 'ORDER_STATUS')
                    sample_size:
                      type: integer
                      description: 'Optional: Number of records to analyze (10-10000). Default: 1000. Larger samples = more
                        accurate but slower.'
                      minimum: 10
                      maximum: 10000
                      default: 1000
                    include_outliers:
                      type: boolean
                      description: 'Optional: Detect and report outliers using IQR method. Default: true'
                      default: true
                  required:
                  - space_id
                  - asset_name
                  - column_name
              required:
              - arguments
      responses:
        '200':
          description: Tool result
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    description: Tool output (string or structured JSON)
        '401':
          description: Unauthorized
        '500':
          description: Server error
      security:
      - bearerAuth: []
  /api/tools/execute_query:
    post:
      operationId: execute_query
      summary: Execute read-only SQL queries against SAP Datasphere tables to retrieve and analyze data
      description: 'Execute read-only SQL queries against SAP Datasphere tables to retrieve and analyze data.


        **IMPORTANT: This is a HIGH-RISK tool that requires user consent before execution.**


        **Use this tool when:**

        - User explicitly requests data retrieval (e.g., "Show me customers from USA")

        - Need to perform data analysis with aggregations

        - Joining multiple tables for insights

        - Filtering and sorting data


        **Capabilities:**

        - SELECT queries with full SQL syntax (WHERE, JOIN, GROUP BY, ORDER BY, LIMIT)

        - Read-only access - NO write operations allowed

        - Results limited to 100 rows by default (configurable via limit parameter)

        - Automatic query sanitization and injection prevention


        **Security & Restrictions:**

        - Only SELECT statements allowed

        - Blocked operations: INSERT, UPDATE, DELETE, DROP, CREATE, ALTER, etc.

        - No SQL comments allowed (security risk)

        - Queries sanitized to prevent injection attacks

        - User consent required before execution (high-risk operation)


        **Query best practices:**

        1. Always specify a LIMIT to control result size

        2. Use WHERE clauses to filter data efficiently

        3. Check table schema first with get_table_schema()

        4. Use qualified table names when joining


        **Example queries:**

        - "SELECT * FROM CUSTOMER_DATA WHERE country = ''USA'' LIMIT 10"

        - "SELECT customer_id, SUM(amount) as total FROM SALES_ORDERS GROUP BY customer_id ORDER BY total DESC LIMIT 20"

        - "SELECT c.customer_name, o.order_date, o.amount FROM CUSTOMER_DATA c JOIN SALES_ORDERS o ON c.customer_id = o.customer_id
        WHERE o.status = ''COMPLETED'' LIMIT 50"


        **Error handling:**

        - Invalid SQL syntax: Returns syntax error with guidance

        - Forbidden operations: Blocked with explanation

        - Missing tables: Suggests using search_tables() to find correct name

        - Permission denied: Explains consent requirement


        **Note:** This tool uses mock data in development. Real query execution requires OAuth authentication.

        '
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                arguments:
                  type: object
                  properties:
                    space_id:
                      type: string
                      description: The Datasphere space ID where tables exist (e.g., 'SALES_ANALYTICS', 'FINANCE_DWH'). Must
                        be uppercase.
                    sql_query:
                      type: string
                      description: 'The SELECT query to execute. Must start with SELECT. Examples: ''SELECT * FROM CUSTOMER_DATA
                        LIMIT 10'', ''SELECT customer_id, COUNT(*) FROM SALES_ORDERS GROUP BY customer_id'''
                    limit:
                      type: integer
                      description: 'Maximum number of rows to return. Default: 100. Range: 1-1000. Use smaller limits for
                        faster responses.'
                      default: 100
                  required:
                  - space_id
                  - sql_query
              required:
              - arguments
      responses:
        '200':
          description: Tool result
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    description: Tool output (string or structured JSON)
        '401':
          description: Unauthorized
        '500':
          description: Server error
      security:
      - bearerAuth: []
  /api/tools/smart_query:
    post:
      operationId: smart_query
      summary: 🚀 **SMART QUERY** - Intelligent query router that automatically selects the best execution method for your
        query
      description: "\U0001F680 **SMART QUERY** - Intelligent query router that automatically selects the best execution method\
        \ for your query.\n\n**NEW in v1.0.5** - This is a composite tool combining execute_query, query_relational_entity,\
        \ and query_analytical_data with intelligent routing and fallback logic.\n\n**Why use smart_query instead of individual\
        \ query tools?**\n- ✅ Automatic routing to the most reliable method\n- ✅ Fallback handling if primary method fails\n\
        - ✅ No need to understand different query methods\n- ✅ Better error recovery and diagnostics\n- ✅ Performance optimization\
        \ based on query type\n\n**How it works:**\n1. **Analyzes your query** - Detects SQL syntax, aggregations, complexity\n\
        2. **Routes intelligently** - Chooses the best execution method:\n   - Aggregations (SUM, COUNT, GROUP BY) → Analytical\
        \ endpoint\n   - Simple SELECT → Relational endpoint (most reliable)\n   - Complex SQL → SQL parsing with OData conversion\n\
        3. **Falls back gracefully** - If primary method fails, tries alternatives\n4. **Returns detailed logs** - Shows routing\
        \ decisions and execution path\n\n**Query Modes:**\n- `auto` (default) - Intelligent routing based on query analysis\n\
        - `relational` - Force use of relational endpoint (most reliable)\n- `analytical` - Force use of analytical endpoint\
        \ (for aggregations)\n- `sql` - Force use of SQL parsing method\n\n**Use this tool when:**\n- You want reliable query\
        \ execution without worrying about method selection\n- You're unsure which query method to use\n- You need fallback\
        \ handling for production reliability\n- You want to see execution diagnostics\n\n**Supported query patterns:**\n\
        - Simple SELECT: `SELECT * FROM SAP_SC_FI_V_ProductsDim LIMIT 10`\n- Filtering: `SELECT * FROM table WHERE PRICE >\
        \ 1000`\n- Column selection: `SELECT PRODUCTID, PRICE FROM table`\n- Aggregations: `SELECT COMPANYNAME, SUM(GROSSAMOUNT)\
        \ FROM table GROUP BY COMPANYNAME`\n- Sorting: `SELECT * FROM table ORDER BY PRICE DESC LIMIT 5`\n\n**Parameters:**\n\
        - `space_id` - Space ID (e.g., \"SAP_CONTENT\")\n- `query` - SQL query or natural language request\n- `mode` - Routing\
        \ mode: \"auto\", \"relational\", \"analytical\", \"sql\" (default: \"auto\")\n- `limit` - Max rows to return (default:\
        \ 1000)\n- `include_metadata` - Include routing logs and decisions (default: true)\n- `fallback` - Enable fallback\
        \ to alternative methods (default: true)\n\n**Example queries:**\n```\n# Auto-routing - simple SELECT\nsmart_query(space_id=\"\
        SAP_CONTENT\", query=\"SELECT * FROM SAP_SC_FI_V_ProductsDim LIMIT 5\")\n\n# Auto-routing - aggregation\nsmart_query(space_id=\"\
        SAP_CONTENT\", query=\"SELECT COMPANYNAME, SUM(GROSSAMOUNT) FROM SAP_SC_SALES_V_SalesOrders GROUP BY COMPANYNAME\"\
        )\n\n# Force relational mode\nsmart_query(space_id=\"SAP_CONTENT\", query=\"SELECT * FROM SAP_SC_FI_V_ProductsDim\"\
        , mode=\"relational\")\n\n# Disable fallback (fail fast)\nsmart_query(space_id=\"SAP_CONTENT\", query=\"SELECT * FROM\
        \ table\", fallback=False)\n```\n\n**Response includes:**\n- Query results (data)\n- Method used (relational, analytical,\
        \ sql, or fallback)\n- Execution time\n- Rows returned\n- Routing decision log (if include_metadata=true)\n- Detected\
        \ query characteristics\n\n**Error handling:**\n- If primary method fails, automatically tries fallbacks\n- Returns\
        \ detailed error log showing all attempted methods\n- Provides suggestions for fixing query issues\n- Shows routing\
        \ decisions for debugging\n\n**Performance:**\n- Relational: 1-5 seconds, up to 50K records\n- Analytical: Fast for\
        \ aggregations\n- SQL: 1-5 seconds, up to 1K records\n\n**When to use individual tools instead:**\n- Use `query_relational_entity`\
        \ when you need specific entity_name control\n- Use `query_analytical_data` when you know you need analytical consumption\n\
        - Use `execute_query` when you need exact SQL syntax control\n- Use `smart_query` for everything else (recommended\
        \ for most use cases)\n\n**Note:** This tool provides the same functionality as the individual query tools but with\
        \ better reliability through intelligent routing and fallback handling.\n"
      requestBody:
        required: true

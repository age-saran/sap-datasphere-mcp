                      type: integer
                      description: 'Maximum number of rows to return. Default: 1000. Range: 1-50000'
                      default: 1000
                    include_metadata:
                      type: boolean
                      description: 'Include execution logs and routing decisions in response. Useful for debugging. Default:
                        true'
                      default: true
                    fallback:
                      type: boolean
                      description: 'Enable fallback to alternative query methods if primary fails. Default: true'
